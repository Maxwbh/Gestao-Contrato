[pytest]
DJANGO_SETTINGS_MODULE = gestao_contrato.settings
python_files = tests.py test_*.py *_tests.py
addopts = -v --tb=short --strict-markers --no-migrations
testpaths = tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests

# Silencia warnings benignos conhecidos (ruído no CI), sem esconder os nossos:
# - WhiteNoise avisa que STATIC_ROOT não existe (collectstatic não roda em teste)
# - utcnow()/utcfromtimestamp() são deprecados no Python 3.12 e vêm de libs
#   externas (openpyxl, dateutil); nosso código já usa datetime.now(UTC).
filterwarnings =
    ignore:No directory at:UserWarning
    ignore:datetime\.datetime\.utcnow\(\) is deprecated:DeprecationWarning
    ignore:datetime\.datetime\.utcfromtimestamp\(\) is deprecated:DeprecationWarning

# PostgreSQL obrigatório — SQLite não é suportado em produção nem em testes.
# Configurar DATABASE_URL antes de rodar os testes:
#   export DATABASE_URL="postgresql://gestao_test:gestao_test@localhost:5432/gestao_contrato_test?options=-csearch_path=gestao_contrato"
# O banco de teste é criado automaticamente pelo pytest-django (prefixo test_).
