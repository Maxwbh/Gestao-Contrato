name: 🐛 Reportar Bug
description: Algo não funciona como deveria
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar! **Falhas de segurança NÃO devem ser abertas aqui** — siga a [Política de Segurança](../blob/master/SECURITY.md).
  - type: textarea
    id: descricao
    attributes:
      label: O que aconteceu?
      description: Descreva o problema e o que você esperava que acontecesse.
      placeholder: "Ao gerar o contrato na etapa 4, o botão fica em 'Processando...' e nada acontece."
    validations:
      required: true
  - type: textarea
    id: passos
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. Acesse Contratos → Novo (wizard)
        2. Preencha as etapas 1–3
        3. Na etapa 4, clique em "Criar Contrato"
    validations:
      required: true
  - type: input
    id: tela
    attributes:
      label: Tela / URL
      placeholder: "/contratos/wizard/preview/"
  - type: dropdown
    id: modulo
    attributes:
      label: Módulo
      options:
        - Contratos
        - Financeiro / Cobrança (boletos, CNAB, Boleto-API)
        - Portal do Comprador
        - Notificações (e-mail/SMS/WhatsApp)
        - Cadastros (core)
        - Relatórios / BI
        - Outro
    validations:
      required: true
  - type: textarea
    id: evidencias
    attributes:
      label: Evidências
      description: Print da tela, erro do console do navegador (F12) ou trecho de log. **Remova dados pessoais/sensíveis.**
  - type: input
    id: versao
    attributes:
      label: Versão do sistema
      description: "Exibida no rodapé (ex.: v3.2.85)"
      placeholder: "v3.2.85"
