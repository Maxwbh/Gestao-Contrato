name: CI

on:
  push:
    branches: ["claude/**", "V3.1", "master"]
  pull_request:
    branches: ["V3.1", "master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Testes (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    # Sem serviço PostgreSQL — testes usam SQLite em memória via pytest --no-migrations
    env:
      SECRET_KEY: ci-test-secret-key-not-for-production-use
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      # DATABASE_URL não definido → settings.py usa SQLite (modo dev/test)

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar sintaxe Python
        run: |
          python -m py_compile financeiro/views.py
          python -m py_compile contratos/views.py
          python -m py_compile core/views.py
          echo "Sintaxe OK"

      - name: Executar testes (unit)
        run: |
          python -m pytest tests/unit/ \
            --tb=short \
            -q \
            --cov=financeiro \
            --cov=contratos \
            --cov=core \
            --cov=notificacoes \
            --cov=portal_comprador \
            --cov-report=term-missing \
            --cov-fail-under=25

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Instalar flake8
        run: pip install flake8
      - name: Executar flake8
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=migrations,staticfiles,media,venv,.venv,static/vendor \
            --per-file-ignores="*/migrations/*.py:E501,F401" \
            --extend-ignore=E501 \
            --count \
            --statistics

  no-ai-refs:
    name: Sem referências a IA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar mensagens de commit
        run: |
          # Descobre a base de comparação: apenas commits recém enviados
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            # Push: github.event.before é o SHA anterior ao push
            BEFORE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            # Branch nova: before é 0000...0000 — usa merge-base como fallback
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BASE=$(git merge-base HEAD origin/V3.1 2>/dev/null \
                     || git merge-base HEAD origin/master 2>/dev/null \
                     || echo "")
            else
              BASE="$BEFORE"
            fi
          fi

          if [ -z "$BASE" ]; then
            echo "✅ Branch nova sem base — nada a verificar."
            exit 0
          fi

          COMMITS=$(git log "$BASE".."$HEAD" --format="%H")

          if [ -z "$COMMITS" ]; then
            echo "✅ Nenhum commit novo para verificar."
            exit 0
          fi

          AI_PATTERN='claude\.ai|anthropic\.com|openai\.com|chatgpt\.com|chat\.openai\.com|gemini\.google\.com|bard\.google\.com|copilot\.microsoft\.com|copilot\.github\.com|grok\.x\.com|mistral\.ai|perplexity\.ai|Co-Authored-By:.*[Cc]opilot|Co-Authored-By:.*[Cc]laude|Co-Authored-By:.*ChatGPT|Co-Authored-By:.*Gemini|[Gg]enerated by (AI|Claude|ChatGPT|Copilot|Gemini|GPT)|[Pp]owered by (AI|Claude|OpenAI|ChatGPT)'

          FOUND=0
          for sha in $COMMITS; do
            MSG=$(git log -1 --format="%B" "$sha")
            if echo "$MSG" | grep -qiE "$AI_PATTERN"; then
              echo "❌ Commit $sha contém referência a IA:"
              echo "$MSG" | grep -iE "$AI_PATTERN"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "Remova URLs ou atribuições a ferramentas de IA das mensagens de commit."
            exit 1
          fi
          echo "✅ Nenhuma referência a IA encontrada nos commits."

      - name: Verificar corpo do Pull Request
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          AI_PATTERN='claude\.ai|anthropic\.com|openai\.com|chatgpt\.com|gemini\.google\.com|bard\.google\.com|copilot\.microsoft\.com|grok\.x\.com|mistral\.ai|perplexity\.ai|[Gg]enerated by (AI|Claude|ChatGPT|Copilot|Gemini|GPT)|[Pp]owered by (AI|Claude|OpenAI|ChatGPT)'

          if echo "$PR_BODY" | grep -qiE "$AI_PATTERN"; then
            echo "❌ Descrição do PR contém referência a IA:"
            echo "$PR_BODY" | grep -iE "$AI_PATTERN"
            echo ""
            echo "Remova URLs ou atribuições a ferramentas de IA da descrição do PR."
            exit 1
          fi
          echo "✅ Descrição do PR sem referências a IA."
