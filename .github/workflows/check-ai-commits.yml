name: Verificar Commits de IA

# Bloqueia merge em 'master' se PR contiver commits gerados por IA (Claude, Anthropic, etc.)
# Em 'V3.1' apenas avisa — commits de IA são esperados na fase de staging/revisão.

on:
  push:
    branches:
      - master
      - V3.1
  pull_request:
    branches:
      - master
      - V3.1

jobs:
  check-ai-commits:
    name: Bloquear commits de IA em produção
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (histórico completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar commits de IA
        shell: bash
        run: |
          # Padrões que identificam commits gerados por IA
          AI_PATTERNS="claude\.ai/code|Co-authored-by:.*[Cc]laude|Generated by Claude|claude-sonnet|claude-opus|claude-haiku|anthropic\.com"

          # Determinar range de commits a analisar
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            RANGE="${BASE}..${HEAD}"
          else
            # Push direto — comparar com commit anterior
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.event.after }}"
            # Se BEFORE for all zeros (branch nova), pegar último commit apenas
            if echo "$BEFORE" | grep -qE '^0+$'; then
              RANGE="${AFTER}~1..${AFTER}"
            else
              RANGE="${BEFORE}..${AFTER}"
            fi
          fi

          echo "Analisando commits: $RANGE"
          echo "---"

          COMMITS_COM_IA=()

          while IFS= read -r HASH; do
            [ -z "$HASH" ] && continue
            BODY=$(git log --format="%B" -1 "$HASH" 2>/dev/null)
            if echo "$BODY" | grep -qiE "$AI_PATTERNS"; then
              TITULO=$(echo "$BODY" | head -1)
              COMMITS_COM_IA+=("  ↳ ${HASH:0:8}  $TITULO")
            fi
          done < <(git log --format="%H" "$RANGE" 2>/dev/null)

          TARGET="${{ github.base_ref }}"
          [ -z "$TARGET" ] && TARGET="${{ github.ref_name }}"

          if [ "${#COMMITS_COM_IA[@]}" -eq 0 ]; then
            echo "✅ Nenhum commit de IA detectado. OK."
            exit 0
          fi

          echo "⚠️  Commits de IA detectados (${#COMMITS_COM_IA[@]}):"
          for c in "${COMMITS_COM_IA[@]}"; do
            echo "$c"
          done
          echo ""

          if [ "$TARGET" = "master" ]; then
            echo "🚫 BLOQUEADO: Commits gerados por IA não podem ser mergeados diretamente em 'master'."
            echo ""
            echo "   Fluxo obrigatório (CLAUDE.md):"
            echo "     claude/branch  →  PR  →  V3.1 (revisado por @maxwbh)  →  master (squash/rebase por @maxwbh)"
            echo ""
            echo "   Ação: @maxwbh deve revisar o PR em V3.1 e fazer squash/rebase"
            echo "   antes de promover para master, atribuindo os commits ao próprio usuário."
            exit 1
          else
            echo "ℹ️  Branch '$TARGET': commits de IA são esperados nesta fase (staging/revisão)."
            echo "   Estes commits serão bloqueados caso tentem avançar diretamente para 'master'."
            exit 0
          fi
