name: Verificar Commits de IA

# Bloqueia merge em 'master' se PR contiver commits gerados por IA.
# Desbloqueio: @maxwbh aprova o PR (Review → Approve) — o check reroda automaticamente.
# Em 'V3.1' apenas avisa — commits de IA são esperados na fase de staging/revisão.

on:
  push:
    branches:
      - master
      - V3.1
  pull_request:
    branches:
      - master
      - V3.1
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-ai-commits:
    name: Bloquear commits de IA em produção
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (histórico completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar aprovação por @maxwbh
        id: check_approval
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review'
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.payload.review.pull_request_url.split('/').pop();

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt(pr_number),
            });

            const approved = reviews.some(
              r => r.user.login === 'maxwbh' && r.state === 'APPROVED'
            );

            core.setOutput('approved', approved ? 'true' : 'false');

            if (approved) {
              core.notice('✅ PR aprovado por @maxwbh — verificação de commits de IA ignorada.');
            }

      - name: Verificar commits de IA
        shell: bash
        env:
          MAXWBH_APPROVED: ${{ steps.check_approval.outputs.approved }}
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
          BASE_REF: ${{ github.base_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # ── Bypass: PR já aprovado por @maxwbh ──────────────────────────────
          if [ "$MAXWBH_APPROVED" = "true" ]; then
            echo "✅ PR aprovado por @maxwbh. Verificação ignorada."
            exit 0
          fi

          # ── Padrões que identificam commits gerados por IA ──────────────────
          AI_PATTERNS="claude\.ai/code|Co-authored-by:.*[Cc]laude|Generated by Claude|claude-sonnet|claude-opus|claude-haiku|anthropic\.com"

          # ── Range de commits a analisar ──────────────────────────────────────
          if [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "pull_request_review" ]; then
            RANGE="${BASE_SHA}..${HEAD_SHA}"
          else
            if echo "$BEFORE_SHA" | grep -qE '^0+$'; then
              RANGE="${AFTER_SHA}~1..${AFTER_SHA}"
            else
              RANGE="${BEFORE_SHA}..${AFTER_SHA}"
            fi
          fi

          echo "Analisando commits: $RANGE"
          echo "──────────────────────────────────────────────────────────────"

          FOUND=0

          while IFS= read -r HASH; do
            [ -z "$HASH" ] && continue
            BODY=$(git log --format="%B" -1 "$HASH" 2>/dev/null)
            TITULO=$(echo "$BODY" | head -1)

            # Linhas do corpo que batem com algum padrão
            MATCHES=$(echo "$BODY" | grep -inE "$AI_PATTERNS" || true)

            if [ -n "$MATCHES" ]; then
              FOUND=$((FOUND + 1))
              echo ""
              echo "  ❌  ${HASH:0:8}  $TITULO"
              while IFS= read -r linha; do
                echo "       → $linha"
              done <<< "$MATCHES"
            fi
          done < <(git log --format="%H" "$RANGE" 2>/dev/null)

          # ── Determinar branch alvo ───────────────────────────────────────────
          TARGET="$BASE_REF"
          [ -z "$TARGET" ] && TARGET="$REF_NAME"

          echo ""
          echo "──────────────────────────────────────────────────────────────"

          if [ "$FOUND" -eq 0 ]; then
            echo "✅ Nenhum commit de IA detectado. OK."
            exit 0
          fi

          echo "⚠️  $FOUND commit(s) com marcadores de IA detectados."
          echo ""

          if [ "$TARGET" = "master" ]; then
            echo "🚫 BLOQUEADO — commits de IA não podem ser mergeados diretamente em 'master'."
            echo ""
            echo "   Para desbloquear:"
            echo "   1. Revise os commits listados acima e limpe os marcadores"
            echo "      OU"
            echo "   2. @maxwbh aprova este PR (Review → Approve)"
            echo "      — o check reroda automaticamente e libera o merge."
            echo ""
            echo "   Fluxo obrigatório (CLAUDE.md):"
            echo "     claude/branch → PR → V3.1 (revisado por @maxwbh) → master"
            exit 1
          else
            echo "ℹ️  Branch '$TARGET': commits de IA são esperados nesta fase (staging/revisão)."
            echo "   Serão bloqueados somente se avançarem para 'master' sem aprovação."
            exit 0
          fi
