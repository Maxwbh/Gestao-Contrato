{% extends 'base.html' %}

{% block title %}Excluir Imóvel - Gestão de Contratos{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0">Confirmar Exclusão</h5>
                </div>
                <div class="card-body">
                    <p>Tem certeza que deseja excluir o imóvel <strong>{{ object }}</strong>?</p>
                    <p class="text-danger"><small>Esta ação não pode ser desfeita.</small></p>
                    <form method="post">
                        {% csrf_token %}
                        <a href="{% url 'core:listar_imoveis' %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-danger">Excluir</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
