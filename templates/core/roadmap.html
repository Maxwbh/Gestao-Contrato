{% extends 'base.html' %}
{% load static %}

{% block title %}Roadmap — Gestão de Contratos{% endblock %}

{% block extra_css %}
<style>
  .roadmap-body { max-width: 95%; margin: 0 auto; }
  .roadmap-body h2 { margin-top: 2rem; border-bottom: 2px solid #dee2e6; padding-bottom: .4rem; }
  .roadmap-body h3 { margin-top: 1.5rem; color: #495057; }
  .roadmap-body table { width: 100%; border-collapse: collapse; margin: .75rem 0 1.25rem; font-size: .875rem; }
  .roadmap-body table th { background: #343a40; color: #fff; padding: 8px 12px; text-align: left; }
  .roadmap-body table td { padding: 7px 12px; border-bottom: 1px solid #dee2e6; vertical-align: top; }
  .roadmap-body table tr:nth-child(even) td { background: #f8f9fa; }
  .roadmap-body table tr:hover td { background: #e8f4fd; }
  .roadmap-body blockquote { border-left: 4px solid #6c757d; padding: .5rem 1rem; color: #6c757d; background: #f8f9fa; border-radius: 0 4px 4px 0; margin: 1rem 0; }
  .roadmap-body code { background: #f8f9fa; padding: 2px 5px; border-radius: 3px; font-size: .85em; color: #d63384; }
  .roadmap-body pre { background: #f8f9fa; padding: 1rem; border-radius: 6px; overflow-x: auto; }
  .roadmap-body pre code { color: inherit; padding: 0; background: none; }
  .roadmap-body hr { border-color: #dee2e6; margin: 2rem 0; }
  .roadmap-body ul, .roadmap-body ol { padding-left: 1.5rem; }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
  <div class="roadmap-body">
    <div class="d-flex align-items-center mb-3 gap-2">
      <i class="fas fa-map text-primary fa-lg"></i>
      <h2 class="mb-0">Roadmap</h2>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        {{ content_html|safe }}
      </div>
    </div>
  </div>
</div>
{% endblock %}
