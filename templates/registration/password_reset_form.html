{% extends 'base.html' %}
{% block title %}Recuperar senha{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:480px">
  <h4 class="mb-3"><i class="fas fa-unlock-alt me-2 text-primary"></i>Recuperar senha</h4>
  <form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label">E-mail</label>{{ form.email }}</div>
    <button class="btn btn-primary w-100">Enviar link</button>
  </form>
</div>
{% endblock %}
